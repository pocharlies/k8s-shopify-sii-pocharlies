name: Release Production

# Re-registered 2026-05-26 after org rename pocharlies → pocharlies-org left
# push-event triggers in a stale state. Trivial edit forces GitHub to re-parse
# the workflow definition.
on:
  push:
    tags: ["*"]
  workflow_dispatch:
    inputs:
      image_tag:
        description: Optional explicit image tag, for example v1.2.3
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: release-prod-${{ github.repository }}
  cancel-in-progress: false

jobs:
  ci:
    uses: pocharlies-org/k8s-gitops-pocharlies/.github/workflows/reusable-ci.yml@main
    with:
      runner: arc-k8s
      run_node: false
      run_docker_build: false
      kustomize_paths: ". k8s"
    secrets: inherit

  release:
    needs: [ci]
    uses: pocharlies-org/k8s-gitops-pocharlies/.github/workflows/reusable-manifest-release.yml@main
    with:
      runner: arc-k8s
      source_path: k8s
      artifact_name: k8s-shopify-sii-pocharlies
      version: ${{ github.event.inputs.image_tag || github.ref_name }}
    secrets: inherit
