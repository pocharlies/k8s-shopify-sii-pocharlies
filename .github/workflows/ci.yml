name: CI

# Re-registered 2026-05-26 after org rename pocharlies → pocharlies-org left
# push-event triggers in a stale state. Trivial edit forces GitHub to re-parse
# the workflow definition.
on:
  pull_request:
    branches: ["**"]
  push:
    branches: ["**"]
    tags-ignore: ["**"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  standard:
    uses: pocharlies-org/k8s-gitops-pocharlies/.github/workflows/reusable-ci.yml@main
    with:
      runner: arc-k8s
      run_node: false
      run_docker_build: false
      kustomize_paths: ". k8s"
    secrets: inherit
