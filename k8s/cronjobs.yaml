# SII scheduled jobs (migrated off sauvage's `ubuntu` crontab: cron-wrapper.sh sii_*).
# Pins its OWN image (shopify-sii-app:v1.10.8 — ships scripts/ + app/ + tsx + the metrics
# fix) so it is decoupled from the kustomization `images:` rewrite and does NOT touch the
# sii-app Deployment. envFrom sii-secrets (token + full SII config) + the AEAT cert
# (sii-certificate mounted at /app/secrets). timeZone keeps the Spanish fiscal local time.
# Validated end-to-end real (idempotent) + metrics land in VictoriaMetrics.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: invoicing
  labels:
    app.kubernetes.io/component: cron
spec:
  schedule: "0 1 * * *"          # was: sii_invoicing — daily 01:00
  timeZone: Europe/Madrid
  suspend: false                 # ACTIVE — sauvage host cron line removed at cutover 2026-05-24
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 200
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 1800
      ttlSecondsAfterFinished: 86400
      template:
        spec:
          restartPolicy: Never
          imagePullSecrets:
            - name: harbor-pull
          nodeSelector:
            role: edge
            kubernetes.io/arch: amd64
          tolerations:
            - { key: role, operator: Equal, value: edge, effect: NoSchedule }
          volumes:
            - name: sii-certificate           # AEAT client cert (sii.p12) + passphrase
              secret: { secretName: sii-certificate }
          containers:
            - name: invoicing
              image: harbor.lan.e-dani.com/homelab/shopify-sii-app:v1.10.8
              imagePullPolicy: IfNotPresent
              workingDir: /app
              command: ["tsx", "scripts/daily-invoicing.ts"]
              envFrom:
                - secretRef: { name: sii-secrets }
              env:
                - { name: NODE_ENV, value: "production" }
                - name: DB_USER
                  valueFrom: { secretKeyRef: { name: shared-postgres-app, key: username } }
                - name: DB_PASSWORD
                  valueFrom: { secretKeyRef: { name: shared-postgres-app, key: password } }
                - { name: DATABASE_URL, value: "postgresql://$(DB_USER):$(DB_PASSWORD)@postgres-shared-rw.databases.svc.cluster.local:5432/skirmshop" }
                - { name: SHOPIFY_APP_URL, value: "https://skirmshop.e-dani.com/sii" }
                - { name: SHOPIFY_STORE, value: "ymimst-yh.myshopify.com" }
                - { name: SHOPIFY_ADMIN_STORE_HANDLE, value: "skirmshop-spain" }
                - { name: SCOPES, value: "read_orders,read_all_orders,read_products,write_orders,read_customers,write_customers" }
                - { name: SII_CERTIFICATE_PATH, value: "/app/secrets/sii.p12" }
                - { name: SII_REPORT_CHANNEL, value: "ops" }
                - name: SII_CERTIFICATE_PASSPHRASE
                  valueFrom: { secretKeyRef: { name: sii-certificate, key: passphrase } }
              volumeMounts:
                - { name: sii-certificate, mountPath: /app/secrets, readOnly: true }
              resources:
                requests: { cpu: 50m, memory: 192Mi }
                limits: { memory: 768Mi }
---
