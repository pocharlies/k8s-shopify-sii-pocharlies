apiVersion: apps/v1
kind: Deployment
metadata:
  name: app
spec:
  template:
    spec:
      # TEMP HOTFIX: hostPath build override. Remove once the image ships the fix.
      volumes:
        - name: sii-hotfix-build
          hostPath:
            path: /tmp/sii-build-hotfix
            type: Directory
      containers:
        - name: app
          env:
            - { name: SHOPIFY_APP_URL, value: "https://skirmshop.e-dani.com/sii" }
            - { name: SCOPES, value: "read_orders,read_all_orders,read_products,write_orders,read_customers,write_customers" }
            - { name: SHOPIFY_STORE, value: "ymimst-yh.myshopify.com" }
            - { name: SHOPIFY_ADMIN_STORE_HANDLE, value: "skirmshop-spain" }
          envFrom:
            - secretRef: { name: sii-secrets }
          volumeMounts:
            - { name: sii-hotfix-build, mountPath: /app/build, readOnly: true }
