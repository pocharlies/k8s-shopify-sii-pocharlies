apiVersion: apps/v1
kind: Deployment
metadata:
  name: sii-app
  namespace: skirmshop
spec:
  replicas: 1
  selector: { matchLabels: { app: sii-app } }
  template:
    metadata: { labels: { app: sii-app } }
    spec:
      enableServiceLinks: false
      nodeSelector: { role: edge, kubernetes.io/arch: amd64 }
      tolerations:
        - { key: role, operator: Equal, value: edge, effect: NoSchedule }
      containers:
        - name: sii-app
          image: harbor.e-dani.com/homelab/shopify-sii-app:navigation-hotfix-202605221700
          imagePullPolicy: IfNotPresent
          ports: [{ name: http, containerPort: 3000 }]
          env:
            - { name: PORT, value: "3000" }
            - { name: NODE_ENV, value: "production" }
            - { name: DATABASE_URL, value: "postgresql://$(DB_USER):$(DB_PASSWORD)@postgres-shared-rw.databases.svc.cluster.local:5432/skirmshop" }
            - { name: SHOPIFY_APP_URL, value: "https://skirmshop.e-dani.com/sii" }
            - { name: SHOPIFY_STORE, value: "skirmshop-spain.myshopify.com" }
            - { name: SCOPES, value: "read_orders,read_all_orders,read_products,write_orders,read_customers,write_customers" }
          envFrom: [{ secretRef: { name: sii-secrets } }]
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits:   { memory: 512Mi }
          readinessProbe:
            tcpSocket: { port: 3000 }
            initialDelaySeconds: 20
---
---
apiVersion: v1
kind: Service
metadata: { name: sii-app, namespace: skirmshop }
spec:
  selector: { app: sii-app }
  ports: [{ name: http, port: 80, targetPort: 3000 }]
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: skirmshop-sii-public
  namespace: skirmshop
  annotations:
    external-dns.alpha.kubernetes.io/hostname: skirmshop.e-dani.com
    external-dns.alpha.kubernetes.io/target: "57.129.17.172"
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
spec:
  entryPoints: [websecure]
  ingressClassName: traefik-edge
  routes:
    - match: Host(`skirmshop.e-dani.com`) && PathPrefix(`/sii`)
      kind: Rule
      services:
        - name: sii-app
          port: 80
  tls:
    store: { name: default, namespace: traefik-edge }

