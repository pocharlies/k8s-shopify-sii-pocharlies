apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: skirmshop

resources:
  - https://github.com/pocharlies/k8s-shopify-framework-pocharlies.git//base?ref=deploy/prod
  - cronjobs.yaml

namePrefix: sii-

labels:
  - includeSelectors: true
    pairs:
      app.kubernetes.io/instance: sii

images:
  - name: shopify-app
    newName: harbor.e-dani.com/homelab/shopify-sii-app
    newTag: app-fallback-hotfix-202605221758

patches:
  - target: { kind: Deployment, name: app }
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: app
      spec:
        template:
          spec:
            # TEMP HOTFIX: hostPath build override. Remove once the image ships the fix.
            volumes:
              - name: sii-hotfix-build
                hostPath:
                  path: /tmp/sii-build-hotfix
                  type: Directory
            containers:
              - name: app
                env:
                  - { name: SHOPIFY_APP_URL, value: "https://skirmshop.e-dani.com/sii" }
                  - { name: SCOPES, value: "read_orders,read_all_orders,read_products,write_orders,read_customers,write_customers" }
                  - { name: SHOPIFY_STORE, value: "ymimst-yh.myshopify.com" }
                  - { name: SHOPIFY_ADMIN_STORE_HANDLE, value: "skirmshop-spain" }
                envFrom:
                  - secretRef: { name: sii-secrets }
                volumeMounts:
                  - { name: sii-hotfix-build, mountPath: /app/build, readOnly: true }
  - target: { group: traefik.io, version: v1alpha1, kind: IngressRoute, name: app }
    patch: |-
      - op: replace
        path: /spec/routes/0/match
        value: Host(`skirmshop.e-dani.com`) && PathPrefix(`/sii`)
