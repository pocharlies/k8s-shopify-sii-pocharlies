apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: skirmshop

resources:
  - https://github.com/pocharlies/k8s-shopify-framework-pocharlies.git//base?ref=deploy/prod
  - cronjobs.yaml

namePrefix: sii-

labels:
  - includeSelectors: true
    pairs:
      app.kubernetes.io/instance: sii

images:
  - name: shopify-app
    newName: harbor.lan.e-dani.com/homelab/shopify-sii-app
    newTag: v1.10.4

patches:
  - target: { kind: Deployment, name: app }
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: app
      spec:
        template:
          spec:
            # Mount the AEAT client certificate (same source as the cronjobs):
            # secret `sii-certificate` keys `sii.p12` + `passphrase`. Without
            # this the SII Annual sync, daily-invoicing UI action, and DUA
            # search loader all throw "SII_CERTIFICATE_PATH is not configured".
            volumes:
              - name: sii-certificate
                secret: { secretName: sii-certificate }
            containers:
              - name: app
                env:
                  - { name: SHOPIFY_APP_URL, value: "https://skirmshop.e-dani.com/sii" }
                  - { name: SCOPES, value: "read_orders,read_all_orders,read_products,write_orders,read_customers,write_customers" }
                  - { name: SHOPIFY_STORE, value: "ymimst-yh.myshopify.com" }
                  - { name: SHOPIFY_ADMIN_STORE_HANDLE, value: "skirmshop-spain" }
                  - { name: SII_CERTIFICATE_PATH, value: "/app/secrets/sii.p12" }
                  - name: SII_CERTIFICATE_PASSPHRASE
                    valueFrom:
                      secretKeyRef: { name: sii-certificate, key: passphrase }
                envFrom:
                  - secretRef: { name: sii-secrets }
                volumeMounts:
                  - { name: sii-certificate, mountPath: /app/secrets, readOnly: true }
  - target: { group: traefik.io, version: v1alpha1, kind: IngressRoute, name: app }
    patch: |-
      - op: replace
        path: /spec/routes/0/match
        value: Host(`skirmshop.e-dani.com`) && PathPrefix(`/sii`)
